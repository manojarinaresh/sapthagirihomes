<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 110" width="220" height="110">

  <!-- Mountains -->
  <polygon points="10,72 42,28 74,72" fill="#388e3c"/>
  <polygon points="40,72 78,10 116,72" fill="#2e7d32"/>
  <polygon points="88,72 116,34 146,72" fill="#43a047"/>

  <!-- Snow caps -->
  <polygon points="72,16 78,10 84,16 80,20 74,20" fill="#ffffff" opacity="0.85"/>
  <polygon points="36,34 42,28 48,34 44,37 40,37" fill="#ffffff" opacity="0.7"/>

  <!-- Ground -->
  <rect x="0" y="70" width="220" height="3" fill="#2e7d32" rx="1"/>

  <!-- House -->
  <rect x="52" y="48" width="30" height="22" fill="#1a3c6e" rx="1"/>
  <polygon points="47,50 67,36 87,50" fill="#0f2642"/>
  <rect x="57" y="54" width="7" height="7" fill="#90caf9" rx="1"/>
  <rect x="72" y="54" width="7" height="7" fill="#90caf9" rx="1"/>
  <rect x="62" y="60" width="10" height="10" fill="#f4a832" rx="1"/>

  <!-- Temple -->
  <rect x="95" y="52" width="18" height="18" fill="#8b5e3c"/>
  <rect x="93" y="46" width="22" height="8"  fill="#a0693d"/>
  <rect x="96" y="40" width="16" height="7"  fill="#b07840"/>
  <rect x="99" y="35" width="10" height="6"  fill="#c08845"/>
  <polygon points="101,35 104,24 107,35"      fill="#d4a000"/>
  <line x1="104" y1="24" x2="104" y2="17" stroke="#cc0000" stroke-width="1.5"/>
  <polygon points="104,17 112,21 104,24"      fill="#cc0000"/>
  <rect x="100" y="58" width="8" height="12" fill="#5a3a1a" rx="2 2 0 0"/>

  <!-- Name -->
  <text x="110" y="88"
        font-family="Georgia,serif" font-size="18" font-weight="bold"
        fill="#1a3c6e" text-anchor="middle" letter-spacing="1">SAPTHAGIRI <tspan fill="#f4a832">HOMES</tspan></text>

  <!-- Tagline -->
  <text x="110" y="104"
        font-family="Arial,sans-serif" font-size="11"
        fill="#2e7d32" text-anchor="middle" letter-spacing="0.8">Homes with Divine Blessings</text>

</svg>
